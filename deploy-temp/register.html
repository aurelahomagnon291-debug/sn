<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snapchat Web - Inscription</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar" aria-label="Navigation principale">
      <div class="brand-area">
        <a class="ghost-mark" href="/" aria-label="Snapchat">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M31.9 7.4c-7.2 0-12.6 5.8-12.6 13.5v8.2c0 1.2-.5 2.2-1.4 2.8-2.2 1.4-4.5 2.2-7.1 2.6-1.8.2-2.6 2.7-1.1 3.8 2.9 2.1 5.4 3.1 8 3.6.9.2 1.6.8 1.9 1.7 1.1 3.4 4.2 5.7 8.1 6.3 1.2.2 2 1.1 2.1 2.3.1 1.4 1.2 2.4 2.7 2.4 1.4 0 2.5-1 2.7-2.4.1-1.2 1-2.1 2.1-2.3 3.9-.6 7-2.9 8.1-6.3.3-.9 1-1.5 1.9-1.7 2.6-.5 5.1-1.5 8-3.6 1.5-1.1.7-3.6-1.1-3.8-2.6-.4-4.9-1.2-7.1-2.6-.9-.6-1.4-1.6-1.4-2.8v-8.2c0-7.7-5.4-13.5-12.8-13.5z"/>
          </svg>
        </a>
      </div>

      <nav class="main-nav" aria-label="Sections Snapchat">
        <a class="nav-item" href="/">
          <span>Connexion</span>
        </a>
      </nav>

      <div class="action-area"></div>
    </header>

    <main class="page-layout register-layout">
      <section class="login-pane" aria-labelledby="register-title">
        <div class="login-block">
          <h1 id="register-title">Cr&eacute;er un compte Snapchat</h1>
          <p class="intro">
            Inscrivez-vous pour chatter, envoyer des Snaps et d&eacute;couvrir du contenu.
          </p>

          <form id="register-form" class="mock-form" novalidate>
            <label for="reg-username">Nom d&rsquo;utilisateur</label>
            <input id="reg-username" name="username" type="text" required autocomplete="off" placeholder="ex : roxy_snap">

            <label for="reg-email">Adresse e-mail</label>
            <input id="reg-email" name="email" type="email" required autocomplete="off" placeholder="ex : roxy@email.com">

            <label for="reg-password">Mot de passe</label>
            <input id="reg-password" name="password" type="password" required minlength="6" placeholder="6 caract&egrave;res minimum">

            <div id="register-message" class="form-message" role="status" aria-live="polite"></div>

            <button class="login-button" type="submit">S&rsquo;inscrire</button>
          </form>

          <p class="app-link">D&eacute;j&agrave; un compte&nbsp;? <a href="/">Connectez-vous.</a></p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>

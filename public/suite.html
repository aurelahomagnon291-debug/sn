<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suite de l'experience</title>
    <meta
      name="description"
      content="Page de transition elegante pour la suite de l'experience mobile."
    />
    <link rel="stylesheet" href="./src/suite.css" />
    <script type="module" src="./src/suite.js"></script>
  </head>
  <body>
    <main class="followup-page">
      <div class="orb orb-left"></div>
      <div class="orb orb-right"></div>

      <section class="followup-card">
        <p class="followup-kicker">Etape suivante</p>
        <h1>Votre acces a bien ete pris en compte.</h1>
        <p class="followup-copy">
          Pour la suite de la presentation, rendez-vous sur Snapchat afin de
          poursuivre l'experience.
        </p>

        <a
          id="snapchat-link"
          class="snapchat-button"
          href="https://www.snapchat.com/"
          target="_blank"
          rel="noreferrer"
        >
          Continuer sur Snapchat
        </a>

        <button id="back-button" class="back-button" type="button">
          Retour a la connexion
        </button>
      </section>
    </main>
  </body>
</html>
